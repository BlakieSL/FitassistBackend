name: Performance Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  gatling:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Start dependencies (MySQL + Redis)
        run: docker compose -f src/main/resources/docker-compose.yaml up -d

      - name: Wait for dependencies to be healthy
        run: |
          echo "Waiting for MySQL..."
          until docker exec main-sqldb mysqladmin ping -h localhost --silent; do sleep 2; done
          echo "Waiting for Redis..."
          until docker exec fitassist-redis redis-cli ping | grep -q PONG; do sleep 2; done

      - name: Start Spring Boot app
        run: ./gradlew bootRun &
        env:
          SPRING_PROFILES_ACTIVE: dev
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          EMAIL_FROM: ${{ secrets.GATLING_EMAIL_FROM }}

      - name: Wait for app to be ready
        run: |
          echo "Waiting for Spring Boot..."
          for i in {1..40}; do
            if curl -sf http://localhost:8000/actuator/health > /dev/null; then
              echo "App is up"
              exit 0
            fi
            echo "Attempt $i/40..."
            sleep 3
          done
          echo "App failed to start"
          exit 1

      - name: Run Gatling simulations
        run: ./gradlew gatlingRun
        env:
          GATLING_BASE_URL: http://localhost:8000
          GATLING_USERNAME: ${{ secrets.GATLING_USERNAME }}
          GATLING_PASSWORD: ${{ secrets.GATLING_PASSWORD }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report
          path: build/reports/gatling/
          retention-days: 30

      - name: Generate index page
        if: always()
        run: |
          mkdir -p build/reports/gatling
          LINKS=""
          for dir in build/reports/gatling/*/; do
            name=$(basename "$dir")
            LINKS="$LINKS<li><a href=\"performance/$name/\">$name</a></li>"
          done
          cat > build/reports/gatling/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Gatling Reports</title>
            <style>body{font-family:sans-serif;padding:2rem}li{margin:.5rem 0}a{font-size:1.1rem}</style>
          </head>
          <body>
            <h1>Gatling Performance Reports</h1>
            <p>Latest run: $(date -u '+%Y-%m-%d %H:%M UTC')</p>
            <ul>$LINKS</ul>
          </body>
          </html>
          EOF

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/reports/gatling
          destination_dir: performance
          keep_files: false
